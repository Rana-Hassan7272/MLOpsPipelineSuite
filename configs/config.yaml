# Configuration file for reproducible experiments

# Logistic Regression Configuration
logistic_regression:
  model:
    name: logistic_regression
    type: classification
  
  dataset:
    name: spam
    path: data_pipeline/processed_data
  
  hyperparameters:
    learning_rate: 0.2
    epochs: 1500
    regularization: 0.001
    adaptive_lr: true
    lr_decay: 0.997
    patience: 150
  
  training:
    random_state: 42
    verbose: false
    early_stopping: true
  
  evaluation:
    cv_folds: 5
    metrics:
      - accuracy
      - precision
      - recall
      - f1_score
      - roc_auc

# K-Means Configuration
kmeans:
  model:
    name: kmeans
    type: clustering
  
  dataset:
    name: store_customers
    path: data_pipeline/processed_data
  
  hyperparameters:
    n_clusters: 5
    n_init: 10
    max_iter: 300
    tol: 0.0001
    auto_k: true
    k_range: [2, 11]
    n_refs: 3
  
  training:
    random_state: 42
    verbose: true
  
  evaluation:
    cv_folds: 5
    metrics:
      - inertia
      - silhouette
      - davies_bouldin
      - calinski_harabasz

# Isolation Forest Configuration
isolation_forest:
  model:
    name: isolation_forest
    type: anomaly_detection
  
  dataset:
    name: creditcard
    path: data_pipeline/processed_data
  
  hyperparameters:
    n_estimators: 400
    max_samples: 256
    contamination: auto  # Will be calculated as 10x actual fraud rate
    max_features: 1.0
    extended: true
    target_recall: 0.80
  
  training:
    random_state: 42
    verbose: true
    n_jobs: -1
  
  evaluation:
    cv_folds: 5
    metrics:
      - roc_auc
      - average_precision
      - precision
      - recall
      - f1

# Experiment configuration
experiment:
  compare_with_sklearn: true
  save_plots: true
  output_dir: experiments/results
