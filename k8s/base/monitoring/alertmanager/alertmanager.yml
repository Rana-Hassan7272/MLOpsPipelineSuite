global:
  resolve_timeout: 5m

route:
  receiver: "default-receiver"
  group_by: ["alertname", "service", "severity"]
  group_wait: 20s
  group_interval: 2m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: "critical-receiver"
      continue: true
    - matchers:
        - severity="warning"
      receiver: "warning-receiver"

receivers:
  - name: "default-receiver"
    webhook_configs:
      - url: "http://127.0.0.1:65535"
        send_resolved: true

  - name: "warning-receiver"
    webhook_configs:
      - url: "http://127.0.0.1:65535"
        send_resolved: true

  - name: "critical-receiver"
    webhook_configs:
      - url: "http://127.0.0.1:65535"
        send_resolved: true
