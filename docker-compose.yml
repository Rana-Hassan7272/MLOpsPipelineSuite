services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      # API sets its own MLflow tracking URI, but keeping this aligned helps during debugging.
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db
      - PROMETHEUS_MULTIPROC_DIR=/tmp
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000

  # Optional: MLflow UI container (useful to verify runs/models).
  mlflow:
    image: python:3.11-slim
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db
    command: >
      sh -c "pip install --no-cache-dir mlflow &&
             mlflow server
               --backend-store-uri sqlite:////app/mlflow.db
               --default-artifact-root /app/experiments/mlruns
               --host 0.0.0.0
               --port 5000"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - api
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
